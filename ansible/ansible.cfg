[defaults]
inventory        = inventory/hosts
remote_user      = luffy
private_key_file = ~/.ssh/homelab
host_key_checking = False
retry_files_enabled = False
# interpreter_python = /usr/bin/python3.11
roles_path = roles

[ssh_connection]
pipelining = True

[privilege_escalation]
become = True
become_method = sudo
become_user = root
become_ask_pass = False
