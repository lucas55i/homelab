---
- name: Instalar K3s no master
  when: inventory_hostname in groups['k3s_master']
  block:
    - name: Baixar e instalar K3s master
      shell: |
        curl -sfL https://get.k3s.io | sh -s - server \
          --write-kubeconfig-mode 644 \
          --disable traefik \
          --node-name {{ inventory_hostname }}
      args:
        creates: /usr/local/bin/k3s

    - name: Aguardar K3s estar pronto
      wait_for:
        path: /etc/rancher/k3s/k3s.yaml
        state: present
        timeout: 300

    - name: Obter token do K3s
      slurp:
        src: /var/lib/rancher/k3s/server/node-token
      register: k3s_token

    - name: Salvar token
      set_fact:
        k3s_master_token: "{{ k3s_token.content | b64decode | trim }}"

    - name: Obter IP do master
      set_fact:
        k3s_master_ip: "{{ ansible_host }}"

- name: Instalar K3s nos workers
  when: inventory_hostname in groups['k3s_workers']
  block:
    - name: Obter token do master
      set_fact:
        k3s_master_token: "{{ hostvars[groups['k3s_master'][0]]['k3s_master_token'] }}"
        k3s_master_ip: "{{ hostvars[groups['k3s_master'][0]]['k3s_master_ip'] }}"

    - name: Baixar e instalar K3s worker
      shell: |
        curl -sfL https://get.k3s.io | K3S_URL=https://{{ k3s_master_ip }}:6443 \
          K3S_TOKEN={{ k3s_master_token }} sh -s - agent \
          --node-name {{ inventory_hostname }}
      args:
        creates: /usr/local/bin/k3s-agent

- name: Configurar kubectl
  when: inventory_hostname in groups['k3s']
  block:
    - name: Criar diretório .kube
      file:
        path: "/home/{{ ansible_user }}/.kube"
        state: directory
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: '0755'

    - name: Copiar kubeconfig
      copy:
        src: /etc/rancher/k3s/k3s.yaml
        dest: "/home/{{ ansible_user }}/.kube/config"
        remote_src: yes
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: '0600'

    - name: Adicionar alias kubectl
      lineinfile:
        path: "/home/{{ ansible_user }}/.bashrc"
        line: "alias k='kubectl'"
        state: present

- name: Validar cluster K3s
  command:
    cmd: kubectl get nodes --kubeconfig /etc/rancher/k3s/k3s.yaml
  register: k3s_check
  changed_when: false
  failed_when: k3s_check.rc != 0

- name: Exibir nodes
  debug:
    var: k3s_check.stdout_lines